# Положи этот файл на сервере:
#   /root/infra/nginx/conf.d/arkadium.conf

server {
    listen 80;
    server_name putevod-ik.ru www.putevod-ik.ru;
    return 301 https://putevod-ik.ru$request_uri;
}

server {
    listen 443 ssl http2;
    server_name putevod-ik.ru www.putevod-ik.ru;

    ssl_certificate     /etc/nginx/certs/putevod-ik.ru/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/putevod-ik.ru/privkey.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Frontend (Vue SPA) ─────────────────────────────────────────────
    location / {
        proxy_pass         http://arkadium-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend API ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://arkadium-backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
