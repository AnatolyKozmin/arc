# Шаблон: скопировать в nginx.conf через sed (см. infra/README.md).
# Сертификаты: infra/certs/arkadium/ и infra/certs/febnik/ (fullchain.crt + privkey.key)
#
# SITE1 — Arkadium (SPA nginx :80 + API :8000)
# SITE2 — febnik (один контейнер, SITE2_UPSTREAM = febnik:8080)

server {
    listen 80;
    server_name SITE1_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name SITE1_DOMAIN;

    ssl_certificate     /etc/nginx/certs/arkadium/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/arkadium/privkey.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 50M;

    location / {
        proxy_pass         http://SITE1_FRONTEND:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass         http://SITE1_BACKEND:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name SITE2_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name SITE2_DOMAIN;

    ssl_certificate     /etc/nginx/certs/febnik/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/febnik/privkey.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 50M;

    location / {
        proxy_pass         http://SITE2_UPSTREAM;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
