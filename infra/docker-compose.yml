# Edge-nginx: единственная точка входа 80/443.
# Папка infra — на одном уровне с репозиториями приложений.
# Сеть arkadium_shared должна существовать: docker network create arkadium_shared
#
# Запуск: см. infra/README.md

services:
  nginx:
    image: nginx:alpine
    container_name: arkadium-edge-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - arkadium_shared
    restart: unless-stopped

networks:
  arkadium_shared:
    external: true
    name: arkadium_shared
