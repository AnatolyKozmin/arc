# putevod-ik.ru (Arkadium) + febnik.ru
# Резолв Docker DNS в рантайме (127.0.0.11), иначе nginx -t падает, пока нет контейнеров
# Upstream: arkadium-site1-frontend, arkadium-site1-backend, febnik

server {
    listen 80;
    server_name putevod-ik.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name putevod-ik.ru;

    # Встроенный DNS Docker
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/nginx/certs/arkadium/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/arkadium/privkey.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 50M;

    location / {
        set $ark_front arkadium-site1-frontend;
        proxy_pass         http://$ark_front:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        set $ark_back arkadium-site1-backend;
        proxy_pass         http://$ark_back:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name febnik.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name febnik.ru;

    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/nginx/certs/febnik/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/febnik/privkey.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 50M;

    location / {
        set $febnik_up febnik;
        proxy_pass         http://$febnik_up:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
