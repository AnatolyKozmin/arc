# Только Arkadium, один домен. Скопировать на сервер: ~/infra/nginx.conf
# Прод: febnik.ru (Arkadium). Серты: ~/infra/certs/arkadium/{fullchain,privkey} — склейка: infra/scripts/build-arkadium-certs-from-certs2.sh
# Для другого домена — замени server_name и пути/серты, см. infra/README.md
# Upstream: arkadium-site1-frontend :80, arkadium-site1-backend :8000
# ВАЖНО: при proxy_pass с переменной в хосте нельзя указывать URI (/api/…),
# иначе хвост пути (panel/login) на бэкенд не уходит — только POST /api/ и 404.
# Если в мини-аппе везде «Method Not Allowed» (405) — запросы бьют в /api/ без /announcements, …;
# проверь: proxy_pass http://$ark_back:8000$request_uri; (без суффикса /api/ после порта)
# НЕПРАВИЛЬНО: proxy_pass http://$ark_back:8000/api/;  — с переменной в хосте хвост часто глохнет → POST /api/.
# location /api/ не матчит ровно «/api» без слэша — такой URI уйдёт в location / (фронт). Ниже «= /api» ловит.

server {
    listen 80;
    server_name febnik.ru www.febnik.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name febnik.ru www.febnik.ru;

    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/nginx/certs/arkadium/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/arkadium/privkey.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 50M;

    location = /api {
        set $ark_back arkadium-site1-backend;
        proxy_pass         http://$ark_back:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        set $ark_front arkadium-site1-frontend;
        proxy_pass         http://$ark_front:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        set $ark_back arkadium-site1-backend;
        proxy_pass         http://$ark_back:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
