# Только putevod-ik.ru → Arkadium (без febnik и других доменов).
# Скопировать на сервер: ~/infra/nginx.conf
# Серты: ~/infra/certs/arkadium/fullchain.crt + privkey.key
# Upstream: arkadium-site1-frontend :80, arkadium-site1-backend :8000/api/
#
# server_name: без www / с www. Если в сертификате (SAN) только putevod-ik.ru, убери www
# отсюда, иначе https://www... получит несоответствие имени. Для Let's Encrypt:
# certbot certonly ... -d putevod-ik.ru -d www.putevod-ik.ru

server {
    listen 80;
    server_name putevod-ik.ru www.putevod-ik.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name putevod-ik.ru www.putevod-ik.ru;

    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/nginx/certs/arkadium/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/arkadium/privkey.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 50M;

    location / {
        set $ark_front arkadium-site1-frontend;
        proxy_pass         http://$ark_front:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        set $ark_back arkadium-site1-backend;
        proxy_pass         http://$ark_back:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
