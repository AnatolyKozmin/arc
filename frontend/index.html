<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Аркадиум</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- До Vue: hash с tgWebAppData не должен теряться (hash-router перезаписывал бы фрагмент). -->
    <script>
      (function () {
        try {
          function store(raw) {
            if (raw && String(raw).trim()) sessionStorage.setItem('ark_tg_init_data_raw', raw)
          }
          var h = window.location.hash || ''
          if (h.length > 1) {
            var p = new URLSearchParams(h.slice(1))
            store(p.get('tgWebAppData'))
          }
          if (!sessionStorage.getItem('ark_tg_init_data_raw')) {
            var q = new URLSearchParams(window.location.search || '')
            store(q.get('tgWebAppData'))
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
