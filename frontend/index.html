<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Аркадиум</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- До Vue: сохранить tgWebAppData из URL (расширенный разбор фрагмента). -->
    <script>
      (function () {
        try {
          function store(raw) {
            if (raw && String(raw).trim()) sessionStorage.setItem('ark_tg_init_data_raw', raw)
          }
          var hash = window.location.hash || ''
          var frag = hash.indexOf('#') === 0 ? hash.slice(1) : hash
          if (frag.indexOf('/') === 0) {
            var j = frag.indexOf('tgWebAppData=')
            if (j !== -1) frag = frag.slice(j)
          }
          var search = (window.location.search || '').replace(/^\?/, '')
          ;[frag, search, [frag, search].filter(Boolean).join('&')].forEach(function (part) {
            if (!part) return
            var p = new URLSearchParams(part)
            store(p.get('tgWebAppData'))
          })
          if (!sessionStorage.getItem('ark_tg_init_data_raw')) {
            var m = (window.location.href || '').match(/[#?&]tgWebAppData=([^&]+)/)
            if (m && m[1]) {
              try {
                store(decodeURIComponent(m[1]))
              } catch (e) {
                store(m[1])
              }
            }
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
