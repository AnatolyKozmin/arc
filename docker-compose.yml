# Arkadium: frontend + backend + bot. TLS и 80/443 — отдельно (папка infra на сервере).
# Сеть: arkadium_shared (создать один раз: docker network create arkadium_shared)
#
# .env: DOMAIN, SITE_SLUG=site1, BOT_TOKEN, SECRET_KEY, …
# Запуск из корня: docker compose up -d --build  (файл .env подхватывается сам)

services:
  backend:
    build: ./backend
    container_name: arkadium-${SITE_SLUG:-site1}-backend
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
      - DATABASE_URL=sqlite:////data/arkadium.db
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS:-}
      - ORGANIZER_TELEGRAM_IDS=${ORGANIZER_TELEGRAM_IDS:-}
      # Список origin через запятую. Если не задать в .env — https://$DOMAIN и https://www.$DOMAIN
      - CORS_ORIGINS=${CORS_ORIGINS:-https://${DOMAIN},https://www.${DOMAIN}}
      - DEV_MODE=${DEV_MODE:-false}
      - PANEL_USERNAME=${PANEL_USERNAME:-admin}
      - PANEL_PASSWORD=${PANEL_PASSWORD:-arkadium2026}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - db-data:/data
      - uploads-data:/app/uploads
    networks:
      - arkadium_shared
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: arkadium-${SITE_SLUG:-site1}-frontend
    networks:
      - arkadium_shared
    restart: unless-stopped

  bot:
    build: ./bot
    container_name: arkadium-${SITE_SLUG:-site1}-bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - MINI_APP_URL=${MINI_APP_URL:-https://${DOMAIN}}
      - MENU_BUTTON_TEXT=${MENU_BUTTON_TEXT:-🎮 Аркадиум}
      - API_BASE=http://arkadium-${SITE_SLUG:-site1}-backend:8000/api
      - PANEL_USERNAME=${PANEL_USERNAME:-admin}
      - PANEL_PASSWORD=${PANEL_PASSWORD:-arkadium2026}
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS:-}
    depends_on:
      - backend
    networks:
      - arkadium_shared
    restart: unless-stopped

networks:
  arkadium_shared:
    external: true
    name: arkadium_shared

volumes:
  db-data:
  uploads-data:
