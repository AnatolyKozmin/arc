# Стек Аркадиума БЕЗ своего nginx — за TLS и 80/443 отвечает общий reverse-proxy.
# Запускать из КОРНЯ репозитория, с отдельным .env на каждый сайт (см. README).
#
# Пример:
#   docker network create arkadium_shared
#   docker compose --env-file .env.site1 -f deploy/multi-site/docker-compose.apps-only.yml up -d --build
#
# Обязательно в .env задать: DOMAIN, SITE_SLUG (например site1), BOT_TOKEN, …

services:
  backend:
    build: ./backend
    container_name: arkadium-${SITE_SLUG}-backend
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
      - DATABASE_URL=sqlite:////data/arkadium.db
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS:-}
      - ORGANIZER_TELEGRAM_IDS=${ORGANIZER_TELEGRAM_IDS:-}
      - CORS_ORIGINS=https://${DOMAIN}
      - DEV_MODE=${DEV_MODE:-false}
      - PANEL_USERNAME=${PANEL_USERNAME:-admin}
      - PANEL_PASSWORD=${PANEL_PASSWORD:-arkadium2026}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - db-data:/data
      - uploads-data:/app/uploads
    networks:
      - arkadium_shared
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: arkadium-${SITE_SLUG}-frontend
    networks:
      - arkadium_shared
    restart: unless-stopped

  bot:
    build: ./bot
    container_name: arkadium-${SITE_SLUG}-bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - MINI_APP_URL=https://${DOMAIN}
      - API_BASE=http://arkadium-${SITE_SLUG}-backend:8000/api
      - PANEL_USERNAME=${PANEL_USERNAME:-admin}
      - PANEL_PASSWORD=${PANEL_PASSWORD:-arkadium2026}
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS:-}
    depends_on:
      - backend
    networks:
      - arkadium_shared
    restart: unless-stopped

networks:
  arkadium_shared:
    external: true
    name: arkadium_shared

volumes:
  db-data:
    name: arkadium_${SITE_SLUG}_db_data
  uploads-data:
    name: arkadium_${SITE_SLUG}_uploads_data
