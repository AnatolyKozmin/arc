# Три домена. Скопируйте в nginx.conf или sed (см. README).
# Сертификаты: certs/site1/  certs/site2/  certs/site3/  (fullchain.crt + privkey.key)
#
# Сайт 1 / 3 — Arkadium: SITE*_FRONTEND :80, SITE*_BACKEND :8000/api/
# Сайт 2 — febnik: один контейнер → SITE2_UPSTREAM = febnik:8080

# ── Сайт 1 ─────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name SITE1_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name SITE1_DOMAIN;

    ssl_certificate     /etc/nginx/certs/site1/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/site1/privkey.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 50M;

    location / {
        proxy_pass         http://SITE1_FRONTEND:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass         http://SITE1_BACKEND:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

